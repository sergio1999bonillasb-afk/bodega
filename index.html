<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodega Miramonte</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="login" class="h-screen flex flex-col justify-center items-center">
    <img src="./logo.png" style="width:120px;">
    <h1>Bodega Miramonte</h1>

    <button onclick="login('SERGIO')">Sergio</button>
    <button onclick="login('RAUL')">Ra˙l</button>
    <button onclick="login('ROMEO')">Romeo</button>
</div>

<!-- APP -->
<div id="app" style="display:none; padding:20px;">
    <h2 id="user"></h2>

    <input id="search" placeholder="Buscar cˇdigo" oninput="buscar()">

    <div id="resultados"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxa1yYELOH_y4Cn-O_9NINnJg2P_Xv2FSoAN1q-ze_whWKe7U4Uad0p4VZzC0w6x4m7/exec"; // ?? PON TU URL

let data = [];
let currentUser = "";

async function login(user){
    currentUser = user;
    document.getElementById("user").innerText = user;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    await cargarDatos();
}

async function cargarDatos(){
    try{
        const res = await fetch(API_URL + "?action=getData");
        data = await res.json();
    }catch(e){
        alert("Error cargando datos");
    }
}

function buscar(){
    const val = document.getElementById("search").value.toUpperCase();

    const filtrado = data.filter(p => p.Codigo == val);

    let html = "";

    filtrado.forEach(p=>{
        html += `
        <div style="background:white; margin:10px; padding:10px;">
            <b>${p.Codigo}</b><br>
            ${p.Descripcion}<br>
            Stock: ${p.Stock_Bodega}<br>
            Ubicaciˇn: ${p.Ubicacion}<br>
            Lote: ${p.Lote}
        </div>
        `;
    });

    document.getElementById("resultados").innerHTML = html;
}

</script>

</body>
</html>
